<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anthropic CORS Spike (Migrationsamt)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Minimal throwaway styling. Ugly is fine, this is a spike. */
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #222;
    }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input[type="password"] {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .status {
      margin-top: 1rem;
      padding: 0.5rem;
      background: #f4f4f4;
      font-family: monospace;
    }
    .result {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fafafa;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 4rem;
      font-family: monospace;
      font-size: 0.95rem;
    }
    .note { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Anthropic CORS Spike (Migrationsamt, desktop Chrome)</h1>
  <p class="note">
    Phase 0 spike. Tests whether a static page can call Anthropic Messages directly
    from the browser using the dangerous-direct-browser-access header.
    Key is read from the field below at runtime and is never stored or logged.
  </p>

  <label for="apiKey">Anthropic API key</label>
  <input id="apiKey" type="password" autocomplete="off" placeholder="sk-ant-..." />

  <button id="runBtn" type="button">Run spike</button>

  <div class="status" id="status">idle</div>
  <div class="result" id="result"></div>

  <script>
    // Migrationsamt-shaped prompt (hardcoded per plan). Tests CORS plus German
    // bureaucratic vocabulary quality in a single call.
    const SPIKE_PROMPT = "Translate the following into formal Standard German suitable for a phone call to the Migrationsamt of canton Zurich. Reply with only the German translation, no explanation. Source: I would like to renew my B residence permit. My case reference number is ZH-12345.";

    // Anthropic endpoint and model id. Model can be swapped if deprecated.
    const ENDPOINT = "https://api.anthropic.com/v1/messages";
    const MODEL = "claude-3-5-haiku-latest";

    // Grab DOM nodes once.
    const keyInput = document.getElementById("apiKey");
    const runBtn = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    // Update the status line. textContent only, no HTML injection.
    function setStatus(text) {
      statusEl.textContent = text;
    }

    // Render text into the result area. textContent only, never innerHTML.
    function setResult(text) {
      resultEl.textContent = text;
    }

    // Build the request body for Anthropic Messages.
    function buildBody() {
      return JSON.stringify({
        model: MODEL,
        max_tokens: 200,
        messages: [
          { role: "user", content: SPIKE_PROMPT }
        ]
      });
    }

    // Main click handler. Runs one Anthropic call and renders the outcome.
    async function runSpike() {
      const key = keyInput.value.trim();
      if (!key) {
        setStatus("idle");
        setResult("Please paste your Anthropic API key into the field above.");
        return;
      }

      setStatus("running");
      setResult("");

      let response;
      try {
        // Note: we deliberately do not log the headers object or the key.
        response = await fetch(ENDPOINT, {
          method: "POST",
          headers: {
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
            "content-type": "application/json"
          },
          body: buildBody()
        });
      } catch (err) {
        // Most likely a CORS preflight failure or network drop.
        setStatus("failed: network or CORS");
        setResult("Fetch threw an exception: " + (err && err.message ? err.message : String(err)));
        return;
      }

      // Non-2xx: surface the status code and raw body text so the failure mode is visible.
      if (!response.ok) {
        let bodyText = "";
        try {
          bodyText = await response.text();
        } catch (e) {
          bodyText = "(could not read response body: " + (e && e.message ? e.message : String(e)) + ")";
        }
        setStatus("failed: HTTP " + response.status);
        setResult("HTTP " + response.status + "\n\n" + bodyText);
        return;
      }

      // 2xx: parse JSON and extract content[0].text.
      let data;
      try {
        data = await response.json();
      } catch (e) {
        setStatus("failed: invalid JSON");
        setResult("Could not parse response JSON: " + (e && e.message ? e.message : String(e)));
        return;
      }

      const block = data && Array.isArray(data.content) ? data.content[0] : null;
      const text = block && typeof block.text === "string" ? block.text : "";

      if (!text) {
        setStatus("failed: empty completion");
        setResult("Response had no content[0].text. Raw shape: " + JSON.stringify(data));
        return;
      }

      setStatus("success");
      setResult(text);
    }

    // Wire up the button.
    runBtn.addEventListener("click", runSpike);
  </script>
</body>
</html>
